name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json

      - name: Restore
        run: dotnet restore Scoreboard.sln

      - name: Build (Release)
        run: dotnet build Scoreboard.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Scoreboard.sln --configuration Release --no-build --verbosity minimal

  coverage_quality_gate:
    name: Coverage Quality Gate
    runs-on: ubuntu-latest
    needs:
      - build_and_test
    env:
      COVERAGE_THRESHOLD: 85

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json

      - name: Restore
        run: dotnet restore Scoreboard.sln

      - name: Build (Release)
        run: dotnet build Scoreboard.sln --configuration Release --no-restore

      - name: Quality gate (format)
        run: dotnet format Scoreboard.sln --verify-no-changes --severity warn --no-restore

      - name: Test with coverage gate
        run: >
          dotnet test Scoreboard.sln
          --configuration Release
          --no-build
          --verbosity minimal
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:CoverletOutput=./TestResults/Coverage/
          /p:Threshold=${{ env.COVERAGE_THRESHOLD }}
          /p:ThresholdType=line
          /p:ThresholdStat=total

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool --version "5.*"

      - name: Generate coverage report
        run: >
          $HOME/.dotnet/tools/reportgenerator
          "-reports:**/coverage.cobertura.xml"
          -targetdir:coverage-report
          "-reporttypes:TextSummary;HtmlInline;Cobertura"

      - name: Show coverage summary
        run: cat coverage-report/Summary.txt

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report
          if-no-files-found: error
          retention-days: 14
